name: Release APK

# Builds and publishes a signed release APK as a GitHub Release — automatically.
#
# This is the CI counterpart of publish-update.{ps1,sh}: it reproduces the same flow server-side so a
# release is cut from wherever you push, with no local build needed. On every push to master it reads
# `appVersionName` from app/build.gradle.kts and, ONLY if a release for that version does not already
# exist, builds + signs + publishes it. Pushes that don't bump the version are no-ops (the existing
# release is detected and the job skips), so there are never duplicate releases.
#
# SINGLE SOURCE OF TRUTH: the release tag is ALWAYS `v$appVersionName`, derived from the very source
# the APK is built from — the workflow never accepts a free-text version. This makes it impossible to
# publish a tag whose number disagrees with the versionCode baked into the APK (the bug that caused
# the in-app updater to prompt forever: a tag claimed a newer version than the APK actually was, so
# installing never satisfied the check). A post-build step additionally asserts the APK's versionName
# equals the tag, failing the release if they ever drift.
#
# To release: bump `appVersionName` in app/build.gradle.kts, commit, and push to master. That's it.
# (The local publish-update scripts still work for local/offline builds; the "already exists" guard
# keeps the two from colliding.) workflow_dispatch is kept for manual re-runs; its `force` input
# re-publishes the current appVersionName even if its release already exists (it deletes the old one
# first) — useful to rebuild a release, but it can still only ever publish v$appVersionName.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions): KEYSTORE_BASE64
# (base64 of the .jks: `base64 -w0 keystore/peoplehub-release.jks`), KEYSTORE_PASSWORD, KEY_ALIAS,
# KEY_PASSWORD. Repo secrets are NOT exposed publicly even though the repo is public.
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force:
        description: "Re-publish the current appVersionName even if its release already exists"
        type: boolean
        default: false

permissions:
  contents: write

# Never run two releases at once (e.g. two quick pushes); let the first finish.
concurrency:
  group: release-apk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and check if it is already released
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          # The version is ONLY ever appVersionName; the tag is derived from it. No free-text input.
          VERSION="$(sed -n 's/.*val appVersionName = "\([0-9]\+\.[0-9]\+\.[0-9]\+\)".*/\1/p' app/build.gradle.kts | head -n1)"
          if [ -z "$VERSION" ]; then
            echo "ERROR: could not resolve appVersionName from app/build.gradle.kts" >&2
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$FORCE" = "true" ]; then
              echo "Release $TAG exists; force requested — deleting it (and its tag) to re-publish."
              gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
              echo "exists=false" >> "$GITHUB_OUTPUT"
            else
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Release $TAG already exists — nothing to do."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $TAG."
          fi

      - name: Verify signing secrets are present
        if: steps.version.outputs.exists == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$KEYSTORE_BASE64" ]   && missing="$missing KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PASSWORD" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]         && missing="$missing KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]      && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "ERROR: missing required repository secret(s):$missing" >&2
            echo "Set them under Settings -> Secrets and variables -> Actions. Refusing to publish an unsigned APK." >&2
            exit 1
          fi

      - name: Set up JDK 17
        if: steps.version.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode signing keystore
        if: steps.version.outputs.exists == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/app/release.keystore"

      - name: Build signed release APK
        if: steps.version.outputs.exists == 'false'
        env:
          KEYSTORE_FILE: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK version matches the tag
        if: steps.version.outputs.exists == 'false'
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          AAPT="$(ls "$ANDROID_SDK_ROOT"/build-tools/*/aapt 2>/dev/null | sort -V | tail -n1)"
          if [ -z "$AAPT" ]; then
            echo "ERROR: aapt not found under ANDROID_SDK_ROOT; cannot verify APK version." >&2
            exit 1
          fi
          APK_VERSION="$("$AAPT" dump badging "$APK" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")"
          echo "APK versionName=$APK_VERSION, expected=$EXPECTED"
          if [ "$APK_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: built APK is version $APK_VERSION but the release tag is v$EXPECTED." >&2
            echo "Refusing to publish a release whose tag disagrees with the APK (would loop the updater)." >&2
            exit 1
          fi

      - name: Stage APK
        if: steps.version.outputs.exists == 'false'
        run: cp app/build/outputs/apk/release/app-release.apk "PeopleHub-${{ steps.version.outputs.version }}.apk"

      - name: Publish GitHub Release
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: PeopleHub-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
