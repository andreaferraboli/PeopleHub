name: Release APK

# Builds and publishes a signed release APK as a GitHub Release — fully on push.
#
# Just push to master. On every push the workflow auto-computes the NEXT version (the latest
# published release's patch + 1), injects it into the build (APP_VERSION_NAME), and builds + signs +
# publishes it as v<version> with the APK attached. No manual version edit anywhere — the version
# lives in the GitHub releases history, not in a file you have to bump.
#
# NO TAG/APK DRIFT: the chosen version drives the build, so the APK genuinely IS that version, and a
# post-build step asserts the APK's versionName equals the tag (failing otherwise). This is what
# prevents the in-app updater from prompting forever (which happened when a tag claimed a version the
# APK wasn't).
#
# Don't want a given push to release? Put `[skip ci]` in the commit message — GitHub skips the run.
# Need a minor/major jump (e.g. 1.6.x -> 1.7.0 or 2.0.0)? Run it manually from the Actions tab with
# the `version` input; it is injected into the build too, so it stays drift-free.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions): KEYSTORE_BASE64
# (base64 of the .jks: `base64 -w0 keystore/peoplehub-release.jks`), KEYSTORE_PASSWORD, KEY_ALIAS,
# KEY_PASSWORD. Repo secrets are NOT exposed publicly even though the repo is public.
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Force a specific version X.Y.Z (e.g. 1.7.0); leave blank to auto-increment the patch"
        required: false

permissions:
  contents: write

# Never run two releases at once (e.g. two quick pushes); let the first finish so the second
# auto-increments from a version that already includes it.
concurrency:
  group: release-apk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute the version to publish
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            # Manual jump: trust the input but validate it (it drives the build, so no drift).
            VERSION="${INPUT_VERSION#v}"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: manual version must be X.Y.Z (got '$INPUT_VERSION')" >&2
              exit 1
            fi
          else
            # Auto path: next = highest published release's patch + 1.
            LATEST="$(gh release list --repo "$GITHUB_REPOSITORY" --json tagName --jq '.[].tagName' 2>/dev/null \
              | sed 's/^v//' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)"
            if [ -z "$LATEST" ]; then
              # No releases yet: seed from the file's fallback version.
              LATEST="$(sed -n 's/.*\"\([0-9]\+\.[0-9]\+\.[0-9]\+\)\".*/\1/p' app/build.gradle.kts | head -n1)"
              VERSION="${LATEST:-1.0.0}"
            else
              MAJOR="${LATEST%%.*}"
              REST="${LATEST#*.}"
              MINOR="${REST%%.*}"
              PATCH="${REST##*.}"
              VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
          fi
          TAG="v$VERSION"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "ERROR: release $TAG already exists — pick a higher version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Verify signing secrets are present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$KEYSTORE_BASE64" ]   && missing="$missing KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PASSWORD" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]         && missing="$missing KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]      && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "ERROR: missing required repository secret(s):$missing" >&2
            echo "Set them under Settings -> Secrets and variables -> Actions. Refusing to publish an unsigned APK." >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/app/release.keystore"

      - name: Build signed release APK
        env:
          APP_VERSION_NAME: ${{ steps.version.outputs.version }}
          KEYSTORE_FILE: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK version matches the tag
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          AAPT="$(ls "$ANDROID_SDK_ROOT"/build-tools/*/aapt 2>/dev/null | sort -V | tail -n1)"
          if [ -z "$AAPT" ]; then
            echo "ERROR: aapt not found under ANDROID_SDK_ROOT; cannot verify APK version." >&2
            exit 1
          fi
          APK_VERSION="$("$AAPT" dump badging "$APK" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")"
          echo "APK versionName=$APK_VERSION, expected=$EXPECTED"
          if [ "$APK_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: built APK is version $APK_VERSION but the release tag is v$EXPECTED." >&2
            echo "Refusing to publish a release whose tag disagrees with the APK (would loop the updater)." >&2
            exit 1
          fi

      - name: Stage APK
        run: cp app/build/outputs/apk/release/app-release.apk "PeopleHub-${{ steps.version.outputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: PeopleHub-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
