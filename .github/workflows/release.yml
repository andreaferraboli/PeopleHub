name: Release APK

# Builds and publishes a signed release APK as a GitHub Release.
#
# Default trigger is manual (workflow_dispatch) so it does NOT collide with the local
# publish-update.ps1 script. To go fully CI-driven instead, swap the trigger to the `push: tags`
# block below and stop using the script's release step.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.1.1)"
        required: true
  # push:
  #   tags:
  #     - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/app/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK
        run: cp app/build/outputs/apk/release/app-release.apk "PeopleHub-${{ github.event.inputs.tag }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: PeopleHub-${{ github.event.inputs.tag }}.apk
          generate_release_notes: true
