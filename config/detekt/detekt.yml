build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 5
  LongMethod:
    active: true
    threshold: 80
    # Compose screens are intentionally long, declarative trees; their size is not a smell.
    ignoreAnnotated: ['Composable']
  LongParameterList:
    active: true
    functionThreshold: 8
    # Hilt view models inject one use case per action, so constructors are legitimately wide.
    constructorThreshold: 15
    ignoreDefaultParameters: true
    ignoreAnnotated: ['Composable']
  CyclomaticComplexMethod:
    active: true
    threshold: 18
  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    # Room DAOs are interfaces with one method per query/mutation.
    thresholdInInterfaces: 25
    thresholdInFiles: 30
    ignoreAnnotatedFunctions: ['Composable', 'Preview']
  NestedBlockDepth:
    active: true
    threshold: 5

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Za-z0-9]*'
  # Files deliberately group related declarations under a semantic name
  # (e.g. Color.kt, Type.kt, CsvModels.kt, BirthdayRoutes.kt).
  MatchingDeclarationName:
    active: false

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Forbidden TODO marker; implement before committing.'
        value: 'TODO'
      - reason: 'Forbidden FIXME marker; implement before committing.'
        value: 'FIXME'
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludeCommentStatements: true

performance:
  active: true
  # `(0 until n).forEach { }` reads naturally in the calendar-grid builders; the ranges are tiny.
  ForEachOnRange:
    active: false
  # Spreading the small, fixed migrations array into Room's builder is the idiomatic DI call.
  SpreadOperator:
    active: false
