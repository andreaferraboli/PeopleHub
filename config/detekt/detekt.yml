build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 9
    ignoreDefaultParameters: true
    ignoreAnnotated: ['Composable']
  CyclomaticComplexMethod:
    active: true
    threshold: 18
  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    thresholdInFiles: 30
    ignoreAnnotatedFunctions: ['Composable', 'Preview']
  NestedBlockDepth:
    active: true
    threshold: 5

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Za-z0-9]*'

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  ForbiddenComment:
    active: true
    comments:
      - reason: 'Forbidden TODO marker; implement before committing.'
        value: 'TODO'
      - reason: 'Forbidden FIXME marker; implement before committing.'
        value: 'FIXME'
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludeCommentStatements: true

formatting:
  active: true
  Indentation:
    active: false
  MaximumLineLength:
    active: false

compose:
  active: false
